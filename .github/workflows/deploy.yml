name: Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        
    - name: Build Backend
      run: |
        cd backend
        npm ci
        npm run build
        
    - name: Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build
